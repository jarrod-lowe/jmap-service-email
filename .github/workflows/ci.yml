name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

env:
  MAJOR: 1
  MINOR: 0

jobs:
  fmt-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Run fmt-check
        run: make fmt-check

  mod-check:
    name: Go Mod Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Run mod-check
        run: make mod-check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Run tests
        run: make test

  test-race:
    name: Tests (Race Detector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Run tests with race detector
        run: make test-race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulncheck
        run: make vulncheck

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: Run license-check
        run: make license-check

  apidiff:
    name: API Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@latest
      - name: Run apidiff
        run: make apidiff

  tag:
    name: Auto-tag on main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fmt-check, mod-check, test, test-race, lint, vulncheck, license-check, apidiff]
    runs-on: ubuntu-latest
    concurrency:
      group: auto-tag
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Push tag
        run: |
          TAG="v${MAJOR}.${MINOR}.${{ github.run_number }}"
          echo "Tagging as ${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"
