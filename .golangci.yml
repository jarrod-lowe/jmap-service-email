version: "2"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gosec
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      excludes:
        - G101  # Test data only
        - G115  # Known safe conversions - TODO: verify and fix if needed
    govet:
      enable-all: true
      disable:
        - shadow        # Intentional error wrapping patterns
        - fieldalignment # Memory optimization, not correctness
        - unusedwrite    # Test-only and intentional
  issues:
    exclude-use-default: false
    # Exclude linter rules for test files
    exclude-rules:
      - path: _test\.go
        linters:
          - errcheck
          - unusedwrite
